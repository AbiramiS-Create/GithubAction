name: GH200-Workflow

on: push

jobs: 
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Hello World
        run: echo "Hello to the GH-200 Workshop"

      - name: copy code
        uses: actions/checkout@v6

      - name: List Repo Files
        run: ls -la

      - name: Create ASCII Art
        run: |
          sudo apt-get install -y figlet
          figlet "GH-200 COHACK"
          echo "------------------------"
          figlet -f digital "Github Actions"
          echo "ASCII Art Generated"

          build:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
      - name: 🔨 Simulate Build
        run: |
          echo "Building the application..."
          echo "Build completed at $(date)" > build-report.txt
 
      - name: Upload Artifact
        uses: actions/upload-artifact@v5
        with:
          name: build-report
          path: build-report.txt
          retention-days: 1
 
      test:
        runs-on: ubuntu-latest
        needs: build
        steps:
          - name: 🧪 Simulate Tests
            run: echo "✅ All tests passed!"
          - name: Download artifact
            uses: actions/download-artifact@v5
            with:
              name: build-report
     
          - name: Test Artifact
            run: cat build-report.txt
        
